# Supersudo test configuration

[general]
# Path to the real system sudo binary. Keep this absolute to avoid recursion
# if `sudo` is aliased or shimmed to `supersudo`.
real_sudo = "/usr/bin/sudo"

[input]
# "sudo" lets real sudo read the password. "custom" lets supersudo read it,
# show live feedback, validate with `sudo -S -p "" -v`, then run with `sudo -n`.
mode = "custom"
feedback_char = "*"
attempts = 3
# How long the error template stays visible before returning to the normal prompt.
error_delay_ms = 900
# How long the success template stays visible before the command runs.
success_delay_ms = 700

[animations]
loading_bar = "animations/loading_bar.txt"

[animation_speeds]
loading_bar = 80

[display]
enabled = true
# Template files use the same format as inline templates. Relative paths are
# resolved relative to this config file.
template_file = "templates/password.txt"
error_template_file = "templates/error.txt"
success_template_file = "templates/success.txt"

authenticated_template = "{style:ok}Authenticated!{reset} {style:label}using cached sudo credentials for{reset} {style:value}{command}{reset}"

[styles]
corner = "bold bright_magenta"
line = "bright_blue"
side = "bright_magenta"
title = "bold yellow"
label = "dim white"
value = "bright_white"
ok = "bold bright_green"
error = "bold bright_red"
error_box = "bold bright_red"
error_title = "bold bright_yellow"
error_label = "bold red"
error_value = "bright_white"
success_box = "bold bright_green"
success_title = "bold bright_green"
success_label = "green"
success_value = "bright_white"
